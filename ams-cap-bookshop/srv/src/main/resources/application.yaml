---
spring:
  config:
    activate:
      on-profile: default
  sql:
    init:
      platform: h2
cds:
  security:
    mock:
      users:
        admin:
          password: admin
          roles:
            - admin
        user:
          password: user
        content-manager:
          policies:
            - cap.ContentManager
          attributes:
            ias_apis:
              - ManageBookshopContent
        stock-manager:
          policies:
            - cap.StockManager
        stock-manager-fiction:
          policies:
            - local.StockManagerFiction
  data-source:
    auto-config:
      enabled: false

sap:
  spring:
    security:
      identity:
        prooftoken: false

management:
  endpoint:
    health:
      show-components: always # shows individual indicators
      show-details: always
  endpoints:
    web:
      exposure:
        include:
          - health # only expose /health as web endpoint
  health:
    defaults.enabled: false # turn off all indicators by default
    ping.enabled: true
    db.enabled: true
    ams.enabled: true