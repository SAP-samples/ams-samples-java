_schema-version: 3.3.0
ID: cap-java-vh
version: 1.0.0-SNAPSHOT
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
modules:
  - name: cap-java-vh-srv
    type: java
    path: srv
    parameters:
      instances: 1
      buildpack: sap_java_buildpack_jakarta
      routes:
        - route: "${default-url}"
        - route: "${default-host}.cert.${default-domain}"
    properties:
      SPRING_PROFILES_ACTIVE: cloud,sandbox
      JBP_CONFIG_COMPONENTS: "jres: ['com.sap.xs.java.buildpack.jre.SAPMachineJRE']"
      JBP_CONFIG_SAP_MACHINE_JRE: '{ version: 21.+ }'
      AMS_DCL_ROOT: ams
    build-parameters:
      builder: custom
      commands:
        - mvn clean package -DskipTests=true --batch-mode
      build-result: target/*-exec.jar
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
          srv-cert-url: '${protocol}://${default-host}.cert.${default-domain}'
    requires:
      - name: cap-java-vh-auth
        parameters:
          config:
            credential-type: X509_GENERATED
            app-identifier: srv
      - name: cap-java-vh-db
    deployed-after:
      - cap-java-vh-ams-policies-deployer

  - name: cap-java-vh-ams-policies-deployer
    type: javascript.nodejs
    path: .
    build-parameters:
      builder: custom
      commands:
        - npx cds build --for ams
      build-result: srv/src/gen/policies
    parameters:
      buildpack: nodejs_buildpack
      no-route: true
      no-start: true
      tasks:
        - name: deploy-dcl
          command: npm start
          memory: 512M
    requires:
      - name: cap-java-vh-auth
        parameters:
          config:
            credential-type: X509_GENERATED
            app-identifier: ams-policy-deployer

  - name: cap-java-vh-db-deployer
    type: hdb
    path: db
    parameters:
      buildpack: nodejs_buildpack
    build-parameters:
      builder: custom
      commands:
        - npm run build
    requires:
      - name: cap-java-vh-db

  - name: cap-java-vh
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-cert-url}
          forwardAuthToken: true
          forwardAuthCertificates: true
          strictSSL: true
      - name: cap-java-vh-auth
        parameters:
          config:
            credential-type: X509_GENERATED
            app-identifier: approuter
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}
          url: ${default-url}

resources:
  - name: cap-java-vh-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: identity
      service-name: cap-java-vh-auth
      service-plan: application
      config:
        display-name: cap-java-vh
        provided-apis:
          - name: AMS_ValueHelp
            description: Value Help Callback from AMS
            type: public
        authorization:
          enabled: true
          value-help-url: ~{srv-api/srv-cert-url}/odata/v4/AmsValueHelpService/
          value-help-api-name: AMS_ValueHelp
        oauth2-configuration:
          redirect-uris:
            - ~{app-api/app-protocol}://~{app-api/app-uri}/login/callback
          post-logout-redirect-uris:
            - ~{app-api/app-protocol}://~{app-api/app-uri}/*/logout.html
    requires:
      - name: app-api
      - name: srv-api
  - name: cap-java-vh-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
